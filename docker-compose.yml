name: cvperfect_streamlit

services:
  cvperfect:
    build: .
    container_name: cvperfect_streamlit
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./parsing_log.json:/app/parsing_log.json
      - ./parsing_data.json:/app/parsing_data.json
      - ./app.log:/app/app.log
      - ./errors.log:/app/errors.log
      - ./filtered_output:/app/filtered_output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
